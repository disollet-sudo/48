<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Expedição - Di Solle</title>
    
    <link rel="manifest" href="manifest-pc.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-slate-100 font-sans min-h-screen flex flex-col m-0 p-0">

    <!-- NAVBAR SUPERIOR -->
    <nav class="bg-white border-b border-gray-200 p-4 shadow-sm flex justify-between items-center">
        <div id="container-logo" class="h-10 w-44 flex items-center justify-start text-gray-800 font-bold text-sm tracking-wide">
            <span class="animate-pulse text-gray-400">Carregando Logo...</span>
        </div>
        <div class="flex items-center space-x-3">
            <button onclick="alterarMesa()" title="Clique para alterar a mesa" class="text-xs font-mono bg-slate-800 hover:bg-slate-700 px-3 py-1.5 rounded-md border border-slate-700 text-emerald-400 font-bold transition flex items-center space-x-1 cursor-pointer">
                <span id="label-mesa-ativa">Mesa: MESA 01</span>
                <span class="text-[10px] text-slate-400">✏️</span>
            </button>

            <div class="text-xs font-mono bg-slate-800 px-3 py-1.5 rounded-md border border-slate-700 text-amber-400 font-bold">
                Modo: Baixa por Embalagem
            </div>
        </div>
    </nav>

    <!-- CONTEÚDO PRINCIPAL -->
    <main class="flex-1 p-6 max-w-7xl mx-auto w-full grid grid-cols-1 lg:grid-cols-3 gap-6">
        
        <!-- PAINEL ESQUERDO: BIPAGEM -->
        <section class="lg:col-span-1 bg-slate-800 p-6 rounded-xl border border-slate-700 flex flex-col justify-between shadow-md">
            <div>
                <h2 class="text-lg font-bold mb-4 text-slate-200 border-b border-slate-700 pb-2">Saída de Materiais</h2>
                
                <div class="mb-4">
                    <label class="block text-xs font-mono text-slate-400 uppercase mb-1">Qtd de Caixas / Embalagens Bipadas</label>
                    <input type="number" id="campo-caixas" value="1" min="1" class="w-full bg-slate-950 border border-slate-700 rounded-lg p-3 text-2xl font-mono font-bold text-amber-400 focus:outline-none focus:border-amber-500">
                </div>

                <div class="mb-6">
                    <label class="block text-xs font-mono text-slate-400 uppercase mb-1">Código de Barras (Máx. 13 Dígitos)</label>
                    <input type="text" id="campo-codigo" maxlength="13" placeholder="Bipe o código..." autofocus autocomplete="off" class="w-full bg-slate-950 border-2 border-emerald-500 rounded-lg p-4 text-xl font-mono text-emerald-400 font-bold focus:outline-none focus:ring-2 focus:ring-emerald-400">
                    <p class="text-[10px] text-slate-500 font-mono mt-1">O cursor retorna para cá automaticamente após cada bipe.</p>
                </div>
            </div>

            <div id="status-box" class="bg-slate-950 p-4 rounded-lg border border-slate-800 text-center text-sm font-mono text-slate-400">
                Aguardando leitura de código...
            </div>
        </section>

        <!-- PAINEL DIREITO: TABELA DE HISTÓRICO -->
        <section class="lg:col-span-2 bg-slate-800 p-6 rounded-xl border border-slate-700 shadow-md flex flex-col">
            <div class="flex justify-between items-center mb-4 border-b border-slate-700 pb-2">
                <h2 class="text-lg font-bold text-slate-200">Últimas Saídas Registradas</h2>
                <span id="contador-baixas" class="bg-slate-950 text-emerald-400 border border-slate-700 text-xs font-mono px-2 py-1 rounded">
                    Total Operações: 0
                </span>
            </div>

            <div class="flex-1 overflow-x-auto">
                <table class="w-full text-left text-sm font-mono">
                    <thead>
                        <tr class="bg-slate-950 text-slate-400 uppercase text-[10px] tracking-wider border-b border-slate-700">
                            <th class="p-3 w-20">Hora</th>
                            <th class="p-3 w-36">Código</th>
                            <th class="p-3">Descrição</th>
                            <th class="p-3 text-center w-20">Caixas</th>
                            <th class="p-3 text-right text-emerald-400 w-28">Total Itens</th>
                        </tr>
                    </thead>
                    <tbody id="tabela-historico" class="divide-y divide-slate-700/50"></tbody>
                </table>
                <div id="historico-vazio" class="text-center py-12 text-slate-500 text-xs uppercase">
                    Nenhuma saída realizada nesta sessão.
                </div>
            </div>
        </section>
    </main>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbzZzuoTcu83OFwdgZaebw3yk2bRMzR867kT6LGXUkRdBQEFo0WYq0wBvbEMf1D2By-MFw/exec";

        let MESA_ATUAL = localStorage.getItem('mesa_expedicao') || "MESA 01";

        function atualizarDisplayMesa() {
            document.getElementById('label-mesa-ativa').innerText = `Mesa: ${MESA_ATUAL}`;
        }

        function alterarMesa() {
            const novaMesa = prompt("Digite o nome ou número da Mesa / Estação:", MESA_ATUAL);
            if (novaMesa && novaMesa.trim() !== "") {
                MESA_ATUAL = novaMesa.trim().toUpperCase();
                localStorage.setItem('mesa_expedicao', MESA_ATUAL);
                atualizarDisplayMesa();
            }
        }

        const campoCodigo = document.getElementById('campo-codigo');
        const campoCaixas = document.getElementById('campo-caixas');
        const statusBox = document.getElementById('status-box');
        const tabelaHistorico = document.getElementById('tabela-historico');
        const historicoVazio = document.getElementById('historico-vazio');
        const contadorBaixas = document.getElementById('contador-baixas');

        let totalBaixasSessao = 0;
        let LISTA_ITENS = [];
        let REGRAS_CONVERSAO = [];

        async function inicializarDados() {
            atualizarDisplayMesa();
            try {
                const response = await fetch(`${API_URL}?action=buscarDadosExpedicao&nocache=${Math.random()}`);
                const dados = await response.json();
                
                LISTA_ITENS = dados.listaItens || [];
                REGRAS_CONVERSAO = dados.regras || [];

                if (dados.logoId) {
                    document.getElementById('container-logo').innerHTML = `<img src="https://drive.google.com/thumbnail?id=${dados.logoId}&sz=w400" class="h-full object-contain" onerror="this.parentNode.innerText='DI SOLLE';">`;
                } else {
                    document.getElementById('container-logo').innerText = "DI SOLLE";
                }
            } catch (e) {
                document.getElementById('container-logo').innerText = "DI SOLLE";
            }
        }

        // FUNÇÃO DE BUSCA DA DESCRIÇÃO DA ABA LISTA DE ITENS
        function resolverProduto(codigoBipado) {
            const codLimpo = String(codigoBipado).trim();

            // 1. Busca primeiro a descrição oficial na LISTA DE ITENS
            const itemNaLista = LISTA_ITENS.find(i => 
                String(i.produto).trim() === codLimpo || 
                String(i.codigoEan).trim() === codLimpo || 
                String(i.codigoOutro).trim() === codLimpo
            );

            const descricaoOficial = itemNaLista ? itemNaLista.descricao : "";

            // 2. Verifica se o código tem regra de desmembramento
            const regra = REGRAS_CONVERSAO.find(r => String(r.codigoBipado).trim() === codLimpo);
            if (regra) {
                const qtdPorCaixa = (parseInt(regra.unidade) || 1) * (parseInt(regra.cx) || 1);
                return {
                    codigoBase: codLimpo,
                    // Usa a descrição da lista de itens se existir; senão cai no fallback
                    descricao: descricaoOficial || `CONJUNTO / REGRA (${regra.itens.length} itens)`,
                    fatorEmbalagem: qtdPorCaixa,
                    temRegra: true
                };
            }

            // 3. Se não tiver regra, mas está na lista de itens
            if (itemNaLista) {
                return {
                    codigoBase: itemNaLista.produto,
                    descricao: itemNaLista.descricao,
                    fatorEmbalagem: parseInt(itemNaLista.qtdeEmbalag) || 1,
                    temRegra: false
                };
            }

            // 4. Se não achou em lugar nenhum
            return {
                codigoBase: codLimpo,
                descricao: "ITEM SEM CADASTRO NA LISTA DE ITENS",
                fatorEmbalagem: 1,
                temRegra: false
            };
        }

        function tocarBipe(sucesso) {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain);
                gain.connect(ctx.destination);
                
                if (sucesso) {
                    osc.frequency.setValueAtTime(1000, ctx.currentTime);
                    gain.gain.setValueAtTime(0.2, ctx.currentTime);
                    osc.start();
                    osc.stop(ctx.currentTime + 0.12);
                } else {
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(220, ctx.currentTime);
                    gain.gain.setValueAtTime(0.3, ctx.currentTime);
                    osc.start();
                    osc.stop(ctx.currentTime + 0.3);
                }
            } catch (e) {}
        }

        campoCodigo.addEventListener('keydown', async function(e) {
            if (e.key === 'Enter') {
                const codigoBipado = campoCodigo.value.trim();
                const caixasBipadas = parseInt(campoCaixas.value) || 1;
                
                if (!codigoBipado) return;

                campoCodigo.disabled = true;
                statusBox.innerText = "Registrando operação...";

                const infoProduto = resolverProduto(codigoBipado);
                const totalItensCalculados = caixasBipadas * infoProduto.fatorEmbalagem;

                try {
                    const response = await fetch(API_URL, {
                        method: "POST",
                        body: JSON.stringify({ 
                            action: "registrarSaidaExakta", 
                            codigoBipado: codigoBipado,
                            caixas: caixasBipadas,
                            totalItens: totalItensCalculados,
                            mesa: MESA_ATUAL,
                            descricao: infoProduto.descricao
                        })
                    });
                    
                    const resultado = await response.json();

                    if (resultado.success) {
                        tocarBipe(true);
                        const msgEstoque = resultado.descontouEstoque 
                            ? `Estoque Atualizado (${resultado.itensAfetados || 1} item(ns))` 
                            : "Registrado em Saídas (Sem alteração no estoque)";
                        
                        statusBox.innerHTML = `<span class="text-emerald-400 font-bold">✅ Baixa Processada!</span><br><span class="text-xs text-slate-300 leading-tight block mt-1">${infoProduto.descricao}<br>(${msgEstoque})</span>`;
                        
                        historicoVazio.classList.add('hidden');
                        totalBaixasSessao++;
                        contadorBaixas.innerText = `Total Operações: ${totalBaixasSessao}`;

                        const tr = document.createElement('tr');
                        tr.className = "text-xs border-b border-slate-800 hover:bg-slate-800/50";
                        tr.innerHTML = `
                            <td class="p-3 text-slate-500 whitespace-nowrap">${new Date().toLocaleTimeString()}</td>
                            <td class="p-3 font-mono font-bold text-slate-300 whitespace-nowrap">${codigoBipado}</td>
                            <td class="p-3 text-slate-200 uppercase whitespace-normal break-words font-semibold leading-snug">${infoProduto.descricao}</td>
                            <td class="p-3 text-center text-amber-400 font-bold whitespace-nowrap">${caixasBipadas} Cx</td>
                            <td class="p-3 text-right text-emerald-400 font-bold whitespace-nowrap">-${totalItensCalculados} un</td>
                        `;
                        tabelaHistorico.insertBefore(tr, tabelaHistorico.firstChild);
                    } else { 
                        throw new Error(); 
                    }
                } catch (err) { 
                    tocarBipe(false); 
                    statusBox.innerHTML = `<span class="text-red-400 font-bold">❌ Erro ao registrar baixa.</span>`; 
                } finally { 
                    campoCodigo.disabled = false; 
                    campoCodigo.value = ''; 
                    campoCaixas.value = '1'; 
                    campoCodigo.focus(); 
                }
            }
        });

        document.addEventListener('click', function(e) { 
            if (e.target !== campoCaixas && !e.target.closest('button')) campoCodigo.focus(); 
        });

        inicializarDados();
    </script>
</body>
</html>
